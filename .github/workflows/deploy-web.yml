name: Deploy Web

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || secrets.SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || secrets.SUPABASE_ANON_KEY }}
      FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
      FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate deploy secrets
        run: |
          set -euo pipefail
          [[ -n "${NEXT_PUBLIC_SUPABASE_URL}" ]] || { echo "Missing NEXT_PUBLIC_SUPABASE_URL or SUPABASE_URL secret"; exit 1; }
          [[ -n "${NEXT_PUBLIC_SUPABASE_ANON_KEY}" ]] || { echo "Missing NEXT_PUBLIC_SUPABASE_ANON_KEY or SUPABASE_ANON_KEY secret"; exit 1; }
          [[ -n "${FIREBASE_PROJECT_ID}" ]] || { echo "Missing FIREBASE_PROJECT_ID secret"; exit 1; }
          [[ -n "${FIREBASE_SERVICE_ACCOUNT}" ]] || { echo "Missing FIREBASE_SERVICE_ACCOUNT secret"; exit 1; }

      - name: Build static dashboard
        run: npm run build:web

      - name: Write Firebase service account
        run: |
          set -euo pipefail
          cat > "${RUNNER_TEMP}/firebase-service-account.json" <<'EOF'
          ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          EOF
          chmod 600 "${RUNNER_TEMP}/firebase-service-account.json"

      - name: Deploy to Firebase Hosting
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-service-account.json
        run: |
          set -euo pipefail
          npx firebase-tools@15.19.0 deploy --only hosting --project "${FIREBASE_PROJECT_ID}" --non-interactive
